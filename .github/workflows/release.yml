name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TrackFlow ${{ github.ref_name }}"
          releaseBody: "Download the installer below to update TrackFlow."
          releaseDraft: false
          prerelease: false

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Read installer signature
        id: sig
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          Write-Host "Files in $nsisDir :"
          Get-ChildItem $nsisDir | ForEach-Object { Write-Host "  $($_.Name)" }

          $sigFile = Get-ChildItem $nsisDir -Filter "*.exe.sig" | Select-Object -First 1
          if (-not $sigFile) {
            Write-Error "No .sig file found in $nsisDir"
            exit 1
          }
          Write-Host "Using sig file: $($sigFile.Name)"

          $sig    = (Get-Content $sigFile.FullName -Raw).Trim()
          $bundle = $sigFile.BaseName  # e.g. TrackFlow_2.1.0_x64-setup.nsis.zip

          echo "signature=$sig"    >> $env:GITHUB_OUTPUT
          echo "bundle=$bundle"    >> $env:GITHUB_OUTPUT

      - name: Update latest.json in website repo
        shell: pwsh
        env:
          SITE_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SIGNATURE: ${{ steps.sig.outputs.signature }}
          BUNDLE: ${{ steps.sig.outputs.bundle }}
        run: |
          $version  = $env:VERSION
          $sig      = $env:SIGNATURE
          $pubDate  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $url      = "https://github.com/gnznaki/TrackFlowRelease/releases/download/v$version/$env:BUNDLE"

          $json = @{
            version   = $version
            notes     = "See https://github.com/gnznaki/TrackFlowRelease/releases/tag/v$version"
            pub_date  = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          # Get current file SHA
          $headers = @{ Authorization = "token $env:SITE_TOKEN"; "User-Agent" = "TrackFlow-CI" }
          $current = Invoke-RestMethod -Uri "https://api.github.com/repos/gnznaki/TrackFlow-Site/contents/latest.json" -Headers $headers
          $sha = $current.sha

          # Encode content
          $encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($json))

          # Push update
          $body = @{
            message = "Update latest.json for v$version"
            content = $encoded
            sha     = $sha
          } | ConvertTo-Json

          Invoke-RestMethod -Method Put `
            -Uri "https://api.github.com/repos/gnznaki/TrackFlow-Site/contents/latest.json" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"

          Write-Host "latest.json updated to v$version"
